version: "3.8"

services:
  db:
    image: postgres:15
    container_name: pokedex-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shay
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: pokedex
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
